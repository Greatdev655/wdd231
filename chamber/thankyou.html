<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for joining the Lagos Chamber of Commerce">
    <meta name="author" content="Ikechukwu Great">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/join.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script type="module" src="scripts/thankyou.js"></script>
    <title>Chamber Directory - Thank You</title>
</head>

<body>
    

    <main class="thankyou-main">

        <div class="thankyou-container">

            <div class="thankyou-header">
                <i class="fa-solid fa-circle-check"></i>
                <h1>Application Received!</h1>
                <p>Thank you for applying to join the Lagos State Chamber of Commerce. 
                We will review your application and get back to you shortly.</p>
            </div>

            <div class="thankyou-details">
                <h2>Your Submission Details</h2>

                <div class="detail-row">
                    <span class="detail-label">First Name:</span>
                    <span class="detail-value" id="display-firstName"></span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Last Name:</span>
                    <span class="detail-value" id="display-lastName"></span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Email:</span>
                    <span class="detail-value" id="display-email"></span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Phone:</span>
                    <span class="detail-value" id="display-phone"></span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Business Name:</span>
                    <span class="detail-value" id="display-businessName"></span>
                </div>

                <div class="detail-row">
                    <span class="detail-label">Submitted:</span>
                    <span class="detail-value" id="display-timestamp"></span>
                </div>

            </div>

            <a href="index.html" class="back-home">Back to Home</a>

        </div>

    </main>

   
    
</body>
</html>
