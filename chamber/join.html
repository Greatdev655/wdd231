<body>
    <header>
        <div class="logo_container">
            <img src="images/chamberlogo.webp" alt="Chamber Logo">
            <h2> Chamber Directory </h2>
        </div>

        <nav class="navigation">
            <div class="hamburgger-menu">
                <button id="menu-btn"><i class="fa-solid fa-bars"></i></button>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="directory.html">Directory</a></li>
                <li><a href="join.html" class="active">Join</a></li>
                <li><a href="final.html">Discover</a></li>
            </ul>
        </nav>



    </header>

    <main>
        <div class="form_container">
            <h2>Be Part of our Community</h2> 
            <form action="thankyou.html" method="get">

                <div class="name_container">
                    <label for="firstName">First Name:
                        <input type="text" placeholder="Enter your first name" name="firstName" id="firstName"
                            title="Enter your first name" autocomplete="given-name" required>
                    </label>

                    <label for="lastName">Last Name:
                        <input type="text" placeholder="Enter your last name" name="lastName" id="lastName"
                            title="Enter your last name" autocomplete="family-name" required>
                    </label>
                </div>

                <label for="orgTitle">Organization Title:
                    <input type="text" placeholder="E.g Manager" name="orgTitle" id="orgTitle" pattern="[a-zA-Z\- ]{7,}"
                        title="Minimum 7 characters, letters, hyphens and spaces only"
                        autocomplete="organization-title">
                </label>

                <label for="email">Email:
                    <input type="email" placeholder="example@gmail.com" name="email" id="email"
                        title="Please enter your email address" required autocomplete="email">
                </label>

                <label for="phone">Phone:
                    <input type="tel" placeholder="e.g +234 812 345 6789" name="phone" id="phone"
                        title="Please enter your phone number" required autocomplete="tel">
                </label>

                <label for="businessName">Business Name:
                    <input type="text" placeholder="e.g Nexon Tech" name="businessName" id="businessName"
                        title="Please enter your business name" autocomplete="organization" required>
                </label>

                <label for="membershipLevel">Membership Level:
                    <select name="membershipLevel" id="membershipLevel" required
                        title="Please select a membership level">
                        <option value="">Select a level</option>
                        <option value="np">NP Membership - Free</option>
                        <option value="bronze">Bronze Membership</option>
                        <option value="silver">Silver Membership</option>
                        <option value="gold">Gold Membership</option>
                    </select>
                </label>

                <label for="description">Tell us about your Business:
                    <textarea name="description" id="description" title="Tell us about your business"></textarea>
                </label>

                <input type="hidden" name="timestamp" id="timestamp">

                <input type="submit" value="Join Us Today">

            </form>
        </div>

        <div class="membercard_container">

        </div>

    </main>


</body>

</html>
